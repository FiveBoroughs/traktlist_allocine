services:
  traktlist:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY allocine.py trakt_client.py main.py sync.sh ./
        RUN chmod +x sync.sh
        CMD ["bash", "sync.sh"]
    env_file:
      - .env
    volumes:
      - ./.pytrakt.json:/app/.pytrakt.json
    restart: "no"
